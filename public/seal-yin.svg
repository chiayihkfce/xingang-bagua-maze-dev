<svg xmlns="http://www.w3.org/2000/svg" width="280" height="280" viewBox="0 0 280 280">
  <!-- 陰刻透明挖空版：字體處 100% 透明 -->
  
  <defs>
    <!-- 定義挖空遮罩 -->
    <mask id="sealMask">
      <!-- 遮罩背景設為白色 (代表保留紅色) -->
      <rect x="0" y="0" width="280" height="280" fill="white" />
      
      <!-- 文字與邊框設為黑色 (代表在紅色背景中挖掉這些形狀) -->
      <g transform="translate(140, 142) scale(1.3, 1.53)">
        <text x="65" y="-62" font-family="LiSu, STKaiti, serif" font-weight="bold" font-size="40" fill="black" text-anchor="middle" dominant-baseline="central">新</text>
        <text x="65" y="-21" font-family="LiSu, STKaiti, serif" font-weight="bold" font-size="40" fill="black" text-anchor="middle" dominant-baseline="central">港</text>
        <text x="65" y="21" font-family="LiSu, STKaiti, serif" font-weight="bold" font-size="40" fill="black" text-anchor="middle" dominant-baseline="central">文</text>
        <text x="65" y="62" font-family="LiSu, STKaiti, serif" font-weight="bold" font-size="40" fill="black" text-anchor="middle" dominant-baseline="central">教</text>
        <text x="21" y="-62" font-family="LiSu, STKaiti, serif" font-weight="bold" font-size="40" fill="black" text-anchor="middle" dominant-baseline="central">基</text>
        <text x="21" y="-21" font-family="LiSu, STKaiti, serif" font-weight="bold" font-size="40" fill="black" text-anchor="middle" dominant-baseline="central">金</text>
        <text x="21" y="21" font-family="LiSu, STKaiti, serif" font-weight="bold" font-size="40" fill="black" text-anchor="middle" dominant-baseline="central">會</text>
        <text x="21" y="62" font-family="LiSu, STKaiti, serif" font-weight="bold" font-size="40" fill="black" text-anchor="middle" dominant-baseline="central">印</text>
      </g>
      <g transform="translate(140, 140)">
        <text transform="translate(-98, 0) rotate(90) scale(1.6, 2.1)" font-family="serif" font-weight="bold" font-size="34" fill="black" text-anchor="middle" dominant-baseline="central">ᠰᡳᠨ ᡤᠠᠩ ᠸᡝᠨ ᠵᡳᠶᠣᠣ</text>
        <text transform="translate(-41, 0) rotate(90) scale(1.6, 2.1)" font-family="serif" font-weight="bold" font-size="34" fill="black" text-anchor="middle" dominant-baseline="central">ᠵᡳ ᠵᡳᠨ ᡥᡡᡳ ᡩᠣᡵᠣᠨ</text>
      </g>
    </mask>
  </defs>

  <!-- 繪製實心紅底並套用遮罩 -->
  <rect x="0" y="0" width="280" height="280" rx="40" fill="#a0281e" mask="url(#sealMask)" />
</svg>
