name: Daily Certificate Delivery

on:
  schedule:
    - cron: '0 1 * * *' # 每天早上 9:00 (台北時間)
  workflow_dispatch:

jobs:
  send-certificates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Project Dependencies
        run: npm install canvas firebase-admin node-fetch@2

      - name: Execute Automation Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          EMAILJS_CERT_TEMPLATE_ID: ${{ secrets.EMAILJS_CERT_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
        run: node scripts/sendCertificates.js
